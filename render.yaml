services:
  - type: web
    name: resumebuilder-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start --workspace server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MAX_UPLOAD_MB
        value: 50
      - key: REQUIRE_MONGO
        value: false
